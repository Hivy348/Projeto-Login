<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="flower_icon (1).ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Login e Cadastro</title>
</head>

<body>

    <div class="container" id="Login">
        <img src="flower.png" class="flor">
        <h1>Login</h1>
        <form>
            <label>Usuário</label>
            <input type="email" placeholder="E-mail" required><br>
            <label>Senha</label>
            <input type="password" placeholder="Senha" required><br>
            <button>Entrar</button>
        </form>

        <div class="link">
            Não tem cadastro? <a onclick="mostrarCadastro()">Cadastre-se</a>
            <div class="social">
                <span class="facebook">F</span>
                <a href="#" target="_blank" rel="external"></a>
                <span class="x">X</span>
                <a href="#" target="_blank" rel="external"></a>
                <span class="gmail">G</span>
                <a href="#" target="_blank" rel="external"></a>
            </div>
        </div>
    </div>
    <div class="container" id="Cadastro">
        <img src="flower.png" class="flor-cadastro">
        <h2>Cadastro</h2>
        <form>
            <label>Nome</label>
            <input type="text" placeholder="Nome" required>
            <label>E-mail</label>
            <input type="email" placeholder="E-mail" required>
            <label>Senha</label>
            <input type="password" placeholder="Senha" required>
            <button>Cadastrar</button>
        </form>
        
        <div class="link">
            Já tem conta? <a onclick="mostrarLogin()">Entrar</a>
        </div>
    </div>

    <footer>
        <p>&copy;2026-Todos os direitos reservados a Hívynna Aparecida.</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
