<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="flower_icon (1).ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Login e Cadastro</title>
</head>
<body>

    <div class="container" id="Login">
        <h1>Login</h1>
        <label>Usuário</label>
        <input type="email" placeholder="E-mail"
        required><br>
        <label>Senha</label>
        <input type= "password" placeholder="Senha" required><br>
        <button>Entrar</button>

        <div class="link">
            Não tem cadastro? <a onclick="mostrarCadastro()">Cadastre-se</a>

            <div class="social">
                <span>F</span>
                <span>X</span>
                <span>G</span>
            </div>
        </div>
    </div>
    <div class="container" id="Cadastro">
        <h2>Cadastro</h2>
        <label >Nome</label>
        <input type="text" placeholder="Nome" required>
        <label>E-mail</label>
        <input type= "email" placeholder="E-mail" required>
        <label>Senha</label>
        <input type="password" placeholder="Senha" required>
        <button>Cadastrar</button>
        <div class="link">
            Já tem conta? <a onclick="mostrarLogin()">Entrar</a>
        </div>
    </div>
    
    <footer>
        &copy;2026-Todos os direitos reservados a Hívynna Aparecida.
    </footer>

    <script src="script.js"></script>

</body>
</html>
